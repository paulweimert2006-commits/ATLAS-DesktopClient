{% extends "base.html" %}

{% block title %}Login - ACENCIA{% endblock %}

{% block content %}
<div class="container">
    <div class="login-card">
        <h1 class="login-title">ACENCIA Hub</h1>
        <p class="login-subtitle">Melden Sie sich an, um fortzufahren</p>

        <form method="post" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="button button-primary button-full-width">Anmelden</button>
        </form>
    </div>
</div>
{% endblock %}
