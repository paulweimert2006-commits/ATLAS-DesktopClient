{% extends "base.html" %}

{% block title %}Neuen Arbeitgeber hinzufügen - ACENCIA{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1 class="page-title">Neuen Arbeitgeber hinzufügen</h1>
    </div>

    <div class="card form-card">
        <form action="{{ url_for('add_employer') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="card-body">
                <div class="form-section">
                    <h3 class="form-section-title">Hauptinformationen</h3>
                    <div class="form-group">
                        <label for="name">Name des Arbeitgebers</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="provider_key">HR Provider</label>
                        <select id="provider_key" name="provider_key" required>
                            <option value="" disabled selected>Bitte auswählen...</option>
                            <option value="personio">Personio</option>
                            <option value="hrworks">HRworks</option>
                            <option value="sagehr">Sage HR</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">Authentifizierung</h3>
                    <div class="form-group">
                        <label for="access_key">Access Key / Client ID</label>
                        <input type="text" id="access_key" name="access_key" required>
                    </div>
                    <div id="provider-specific-fields">
                        <div class="form-group" id="secret_key_field" style="display: none;">
                            <label for="secret_key">Secret Key / Client Secret</label>
                            <input type="password" id="secret_key" name="secret_key">
                        </div>
                        <div class="form-group" id="slug_field" style="display: none;">
                            <label for="slug">Slug</label>
                            <input type="text" id="slug" name="slug">
                        </div>
                    </div>
                     <div class="form-group checkbox-group" id="is_demo_field" style="display: none;">
                        <input type="checkbox" id="is_demo" name="is_demo" value="true">
                        <label for="is_demo">HRworks Demo-Umgebung verwenden</label>
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">Optionale Adresse (für Exporte)</h3>
                    <div class="form-group">
                        <label for="street">Straße</label>
                        <input type="text" id="street" name="street">
                    </div>
                    <div class="form-group">
                        <label for="zip_code">PLZ</label>
                        <input type="text" id="zip_code" name="zip_code">
                    </div>
                    <div class="form-group">
                        <label for="city">Ort</label>
                        <input type="text" id="city" name="city">
                    </div>
                </div>
            </div>
            <div class="card-footer">
                <a href="{{ url_for('index') }}" class="button button-secondary">Abbrechen</a>
                <button type="submit" class="button button-primary">Arbeitgeber speichern</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('provider_key').addEventListener('change', function () {
        const provider = this.value;
        const secretKeyField = document.getElementById('secret_key_field');
        const slugField = document.getElementById('slug_field');
        const demoField = document.getElementById('is_demo_field');
        const secretKeyInput = document.getElementById('secret_key');
        const slugInput = document.getElementById('slug');

        // Reset all fields
        secretKeyField.style.display = 'none';
        secretKeyInput.required = false;
        slugField.style.display = 'none';
        slugInput.required = false;
        demoField.style.display = 'none';

        if (provider === 'personio' || provider === 'hrworks') {
            secretKeyField.style.display = 'block';
            secretKeyInput.required = true;
        } else if (provider === 'sagehr') {
            slugField.style.display = 'block';
            slugInput.required = true;
        }

        if (provider === 'hrworks') {
            demoField.style.display = 'block';
        }
    });
</script>
{% endblock %}
